name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  public-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify public review artifacts
        run: python scripts/check_public_artifacts.py

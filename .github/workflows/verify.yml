name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  public-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile pipeline entry points
        run: python -m py_compile run_pipeline.py scripts/check_public_artifacts.py

      - name: Verify public review artifacts
        run: python scripts/check_public_artifacts.py

      - name: Run public smoke tests
        run: python -m unittest discover -s tests -p "test_*.py"
